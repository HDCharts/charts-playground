name: Publish

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

concurrency:
  group: playground-snapshot-s3-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-playground-snapshot:
    name: Publish
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ github.repository_owner == 'HDCharts' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Checkout charts repository
        uses: actions/checkout@v6
        with:
          repository: HDCharts/charts
          fetch-depth: 1
          path: charts

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'
          cache: gradle

      - name: Build playground static assets
        shell: bash
        run: |
          set -euo pipefail
          ./gradlew -DchartsLocalPath=charts :playground:jsBrowserDevelopmentExecutableDistribution --no-daemon --stacktrace --build-cache

      - name: Validate required playground files
        shell: bash
        run: |
          set -euo pipefail
          required_files=(
            "playground/build/dist/js/developmentExecutable/index.html"
            "playground/build/dist/js/developmentExecutable/Playground.js"
          )

          for file in "${required_files[@]}"; do
            if [[ ! -f "$file" ]]; then
              echo "Missing required file: $file" >&2
              exit 1
            fi
          done

      - name: Publish snapshot assets to S3
        env:
          DOCS_STATIC_BUCKET: ${{ vars.DOCS_STATIC_BUCKET }}
        shell: bash
        run: |
          set -euo pipefail
          dist_dir="playground/build/dist/js/developmentExecutable"
          cache_control="no-store, max-age=0"
          bucket_uri="s3://${DOCS_STATIC_BUCKET}/static"
          charts_version="$(tr -d '\r' < charts/.version | head -n 1 | xargs)"
          if [[ -z "${charts_version:-}" ]]; then
            echo "Missing or empty charts/.version file." >&2
            exit 1
          fi
          source_sha="${SOURCE_SHA:-${GITHUB_SHA:-$(git rev-parse HEAD)}}"
          published_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          metadata_file="$(mktemp)"
          trap 'rm -f "${metadata_file}"' EXIT

          aws s3 sync "${dist_dir}/" "${bucket_uri}/playground/snapshot/" \
            --delete \
            --cache-control "${cache_control}" \
            --only-show-errors

          printf '{"source_sha":"%s","charts_version":"%s","published_at":"%s"}\n' \
            "${source_sha}" "${charts_version}" "${published_at}" > "${metadata_file}"
          aws s3 cp "${metadata_file}" "${bucket_uri}/_meta/playground-snapshot-publish.json" \
            --content-type "application/json" \
            --cache-control "${cache_control}" \
            --only-show-errors

      - name: Invalidate CloudFront cache
        env:
          CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
        shell: bash
        run: |
          set -euo pipefail
          aws cloudfront create-invalidation \
            --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" \
            --paths \
              "/static/_meta/playground-snapshot-publish.json" \
              "/static/playground/snapshot/*"
